# ========================================
# 📱 定制化 Mihomo 通用进阶配置
# ========================================
# 作者: Custom Config
# 版本: v1.0
# 更新时间: 2026-06-15
# 适用场景: 个人电脑/手机客户端
# 核心功能: 流媒体解锁 | 广告拦截 | AI服务分流 | TUN模式 | 自动测速
# ========================================

# ==================== 锚点配置 ====================
# 代理提供者模板
BaseProvider: &BaseProvider
  type: http
  interval: 86400
  proxy: DIRECT
  health-check:
    enable: true
    url: https://www.google.com/generate_204
    interval: 300
  filter: '^(?!.*(过期|剩余|到期|官网|关注|群|频道|订阅|流量|Traffic|Expire|Panel|QQ|客服))'

# 节点筛选正则表达式
FilterHK: &FilterHK '^(?=.*(?i)(🇭🇰|香港|港|HK|Hong))(?!.*(回国|校园|游戏|(?i)GAME)).*$'
FilterTW: &FilterTW '^(?=.*(?i)(🇹🇼|台湾|台|TW|Taiwan))(?!.*(回国|校园|游戏|(?i)GAME)).*$'
FilterSG: &FilterSG '^(?=.*(?i)(🇸🇬|新加坡|坡|狮城|SG|Singapore))(?!.*(回国|校园|游戏|(?i)GAME)).*$'
FilterJP: &FilterJP '^(?=.*(?i)(🇯🇵|日本|日|JP|Japan))(?!.*(回国|校园|游戏|(?i)GAME)).*$'
FilterKR: &FilterKR '^(?=.*(?i)(🇰🇷|韩国|韩|KR|Korea))(?!.*(回国|校园|游戏|(?i)GAME)).*$'
FilterUS: &FilterUS '^(?=.*(?i)(🇺🇸|美国|美|US|United States|America))(?!.*(回国|校园|游戏|(?i)GAME)).*$'
FilterUK: &FilterUK '^(?=.*(?i)(🇬🇧|英国|英|UK|Britain|United Kingdom))(?!.*(回国|校园|游戏|(?i)GAME)).*$'
FilterEU: &FilterEU '^(?=.*(?i)(🇩🇪|🇫🇷|🇳🇱|🇮🇹|🇪🇸|德国|法国|荷兰|意大利|西班牙|欧洲|EU|Europe)).*$'

# 策略组类型模板
UrlTest: &UrlTest
  type: url-test
  url: https://www.google.com/generate_204
  interval: 300
  tolerance: 50
  lazy: true

Fallback: &Fallback
  type: fallback
  url: https://www.google.com/generate_204
  interval: 300
  lazy: true

LoadBalance: &LoadBalance
  type: load-balance
  strategy: consistent-hashing
  url: https://www.google.com/generate_204
  interval: 300
  lazy: true

# 规则提供者模板 - 基础配置
RuleProviderClassical: &RuleProviderClassical
  type: http
  behavior: classical
  interval: 86400

# ==================== 代理提供者 ====================
# 请在此处填入你的机场订阅链接
proxy-providers:
  Subscribe1:
    <<: *BaseProvider
    url: "http://your-service-provider-url"  # 请替换为你的订阅链接
    # override:
    #   additional-prefix: "[机场1] "  # 可选：为节点添加前缀

  # Subscribe2:
  #   <<: *BaseProvider
  #   url: "http://your-service-provider-url-2"
  #   override:
  #     additional-prefix: "[机场2] "

# ==================== 基础配置 ====================
port: 7890                # HTTP 代理端口
socks-port: 7891          # SOCKS5 代理端口
mixed-port: 7892          # 混合端口（HTTP+SOCKS5）
allow-lan: true           # 允许局域网连接
bind-address: '*'         # 绑定地址
mode: rule                # 运行模式：rule（规则） / global（全局） / direct（直连）
log-level: info           # 日志级别：silent / error / warning / info / debug
ipv6: true                # 启用 IPv6
tcp-concurrent: true      # TCP 并发
unified-delay: true       # 统一延迟
find-process-mode: strict # 进程匹配模式
keep-alive-interval: 30   # TCP Keep Alive 间隔

# ==================== 外部控制 ====================
external-controller: 127.0.0.1:9090  # RESTful API 监听地址
secret: ""                            # API 访问密钥（留空则无需密钥）
external-ui: ui                       # 外部 UI 目录
external-ui-name: metacubexd          # UI 名称
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# ==================== 配置文件 ====================
profile:
  store-selected: true   # 存储 select 选择值
  store-fake-ip: true    # 存储 fake-ip 映射表

# ==================== TUN 模式 ====================
tun:
  enable: true            # 启用 TUN 模式
  stack: mixed            # tun 模式堆栈：system / gvisor / mixed
  dns-hijack:             # DNS 劫持
    - any:53
    - tcp://any:53
  auto-route: true        # 自动设置全局路由
  auto-redirect: true     # 自动配置 iptables 以重定向 TCP 连接
  auto-detect-interface: true  # 自动选择流量出口接口

# ==================== DNS 配置 ====================
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip        # DNS 增强模式：fake-ip / redir-host
  fake-ip-range: 198.18.0.1/16  # Fake-IP 地址池

  # 默认 DNS 服务器
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 主 DNS 服务器
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query

  # 代理节点域名解析服务器
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  # Fake-IP 过滤列表
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localhost'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - '+.stun.*.*.*.*'
    - '+.stun.*.*.*.*.*'
    - '*.n.n.srv.nintendo.net'
    - '+.stun.playstation.net'
    - 'xbox.*.*.microsoft.com'
    - '*.*.xboxlive.com'
    - '*.msftncsi.com'
    - '*.msftconnecttest.com'
    - 'WORKGROUP'

# ==================== 流量嗅探 ====================
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'
    - '+.apple.com'

# ==================== GEO 数据库 ====================
geodata-mode: true
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

